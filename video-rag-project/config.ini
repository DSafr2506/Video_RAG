# Пример конфигурации для разных окружений

[DEFAULT]
max_tokens = 80
overlap = 30
retrieve_topk = 200
final_topk = 5
temporal_window = 6

[development]
device = cpu
batch_size = 16
embed_model = BAAI/bge-m3

[production]
device = cuda
batch_size = 32
embed_model = BAAI/bge-m3
rerank_model = BAAI/bge-reranker-large

[testing]
device = cpu
batch_size = 8
max_tokens = 50
retrieve_topk = 50
